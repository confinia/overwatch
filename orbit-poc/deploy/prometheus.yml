global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel            # spanmetrics from the web app's traces
    static_configs:
      - targets: ["otel-collector:8889"]
  - job_name: grafana         # grafana's own /metrics: embeds, ds queries
    metrics_path: /metrics
    static_configs:
      - targets: ["grafana:3000"]
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
